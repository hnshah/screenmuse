name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: swift build (macOS)
    runs-on: macos-15          # Xcode 16 + Swift 6.0 required by swift-tools-version: 6.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Build ScreenMuseApp
        run: swift build --product ScreenMuseApp 2>&1

      - name: Build ScreenMuseCore
        run: swift build --target ScreenMuseCore 2>&1

      - name: Test ScreenMuseCoreTests
        run: swift test --filter ScreenMuseCoreTests 2>&1
        env:
          CI: true

