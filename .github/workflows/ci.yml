name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15  # Swift 6.0 required
    steps:
      - uses: actions/checkout@v4
      
      - name: Install SwiftLint
        run: brew install swiftlint
      
      - name: Lint
        run: swiftlint  # Run without --strict to allow warnings
  
  build:
    name: Build
    runs-on: macos-15  # Swift 6.0 required
    steps:
      - uses: actions/checkout@v4
      
      - name: Show Xcode Version
        run: xcodebuild -version
      
      - name: Build
        run: swift build -c release
  
  test:
    name: Test
    runs-on: macos-15  # Swift 6.0 required
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Tests
        run: swift test --enable-code-coverage
      
      - name: Generate Coverage Report
        run: |
          xcrun llvm-cov export -format="lcov" \
            .build/debug/ScreenMuseCorePackageTests.xctest/Contents/MacOS/ScreenMuseCorePackageTests \
            -instr-profile .build/debug/codecov/default.profdata > coverage.lcov
      
      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.lcov
          fail_ci_if_error: false
      
      - name: Coverage Summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          xcrun llvm-cov report \
            .build/debug/ScreenMuseCorePackageTests.xctest/Contents/MacOS/ScreenMuseCorePackageTests \
            -instr-profile .build/debug/codecov/default.profdata >> $GITHUB_STEP_SUMMARY
