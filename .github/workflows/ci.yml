name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint --config .swiftlint.yml

  build:
    name: Build
    runs-on: macos-15  # Swift 6.0 required
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build
        run: swift build -c release

  test:
    name: Test
    runs-on: macos-15  # Swift 6.0 required
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Run Tests
        run: swift test --filter ScreenMuseCoreTests
        env:
          CI: true

