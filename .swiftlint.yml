# SwiftLint Configuration for ScreenMuse
# Baseline config: errors only on severe/new violations.
# Pre-existing issues are tracked as GitHub issues for future cleanup.

disabled_rules:
  - trailing_whitespace
  - line_length                               # Disabled: many log messages exceed limits
  - multiple_closures_with_trailing_closure   # Disabled: existing SwiftUI code uses this pattern extensively
  - todo                                      # Disabled: TODOs are tracked in issues
  - force_cast                                # Disabled: pre-existing in 10+ files; tracked for cleanup
  - large_tuple                               # Disabled: pre-existing pattern in OCR code

included:
  - Sources

excluded:
  - Tests
  - .build
  - Package.swift

function_body_length:
  warning: 60
  error: 500  # Large dispatch functions exist; refactor tracked separately

type_body_length:
  warning: 300
  error: 700  # ScreenMuseServer.swift is 616 lines; refactor tracked separately

file_length:
  warning: 600
  error: 1000  # main.swift is 889 lines; refactor tracked separately

identifier_name:
  min_length: 2
  max_length: 60

type_name:
  min_length: 2  # Allows iCloudUploader (lowercase i is an Apple convention)
  max_length: 60
  validates_start_with_lowercase: warning  # Warning only, not error

nesting:
  type_level: 2

cyclomatic_complexity:
  warning: 10
  error: 75  # ScreenMuseServer dispatch function is complexity 66; refactor tracked

