# SwiftLint Configuration for ScreenMuse

disabled_rules:
  - trailing_whitespace
  - line_length  # Disabled: many log messages exceed limits

# Temporarily disabled opt-in rules until code is cleaned up
# opt_in_rules:
#   - empty_count
#   - sorted_imports

included:
  - Sources

excluded:
  - Tests
  - .build
  - Package.swift

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 600
  error: 1000  # Server+Export.swift is 628 lines

identifier_name:
  min_length: 2
  max_length: 60

type_name:
  min_length: 3
  max_length: 40

nesting:
  type_level: 2
  
cyclomatic_complexity:
  warning: 10
  error: 20
