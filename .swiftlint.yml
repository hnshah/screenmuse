# SwiftLint Configuration for ScreenMuse

disabled_rules:
  - trailing_whitespace
  - line_length  # Disabled: many log messages exceed limits
  - multiple_closures_with_trailing_closure  # Disabled: existing SwiftUI code uses this pattern extensively
  - todo  # Disabled: TODOs are tracked in issues, not blocking

# Temporarily disabled opt-in rules until code is cleaned up
# opt_in_rules:
#   - empty_count
#   - sorted_imports

included:
  - Sources

excluded:
  - Tests
  - .build
  - Package.swift

function_body_length:
  warning: 60
  error: 500  # MCP server has large dispatch functions; refactor tracked separately

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 600
  error: 1000  # main.swift is 889 lines; refactor tracked separately

identifier_name:
  min_length: 2
  max_length: 60

type_name:
  min_length: 3
  max_length: 40

nesting:
  type_level: 2

cyclomatic_complexity:
  warning: 10
  error: 25  # MCP dispatch functions have high complexity; refactor tracked separately

